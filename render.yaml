services:
  - type: web
    name: credit-approval-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: >
      sh -c "python manage.py migrate --run-syncdb && gunicorn credit_system.wsgi:application"
    repo: https://github.com/Pavan2207/credit-approval-system
    region: oregon
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: credit_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "True"

databases:
  - name: credit_db
    region: oregon
    plan: free
    postgresMajorVersion: "15"
