services:
  - type: web
    name: credit-approval-system
    env: python
    buildCommand: pip install -r requirements.txt
    preBuildCommand: pip install --upgrade pip setuptools wheel
    startCommand: >
      sh -c "
      python manage.py migrate --run-syncdb || true &&
      python manage.py migrate --noinput ||
      (echo 'Migration failed, retrying in 10s...' && sleep 10 && python manage.py migrate --noinput) &&
      python manage.py import_initial_data --force || true &&
      gunicorn credit_system.wsgi:application --bind 0.0.0.0:$PORT --timeout 120
      "
    repo: https://github.com/Pavan2207/credit-approval-system
    region: oregon
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: credit_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "True"
      - key: DISABLE_COLLECTSTATIC
        value: "1"
      - key: PYTHONUNBUFFERED
        value: "1"

databases:
  - name: credit_db
    region: oregon
    plan: free
    postgresMajorVersion: "15"

