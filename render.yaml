services:
  - type: web
    name: credit-approval-system
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: gunicorn credit_system.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: credit_system.settings
      - key: DEBUG
        value: False
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
    disk:
      mountPath: /app/data
      name: app-data

  - type: pserv
    name: celery
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A credit_system worker -l info
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: credit_system.settings
      - key: DEBUG
        value: False
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: CELERY_BROKER_URL
        fromService:
          name: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: redis
          property: connectionString

  - type: redis
    name: redis
    region: oregon
    maxmemoryPolicy: allkeys-lru

